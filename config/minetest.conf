# The Great Wall — config serveur (defense game, no-build)
server_name = The Great Wall
server_description = Hold the wall. 200 waves. Kill or capture. Don't lose the door.
server_address = greatwall.progsoft.eu
server_url = https://greatwall.progsoft.eu
server_announce = false

# Network
port = 30000
bind_address = 0.0.0.0
strict_protocol_version_checking = false

# Gameplay — defense, pas de creative, pas de PvP entre joueurs
creative_mode = false
enable_damage = true
enable_pvp = false
disable_anticheat = false

# Joueurs : interact requis pour utiliser armes/boutons. PAS de "place" libre
# pour éviter que les joueurs construisent — la réparation passe par tgw_shop.
max_users = 16
default_privs = interact, shout, fast
basic_privs = interact, shout
name = admin

# Auth
disallow_empty_password = true
default_password =

# Monde : mapgen plat, sans forêts/décorations ni cavernes (tgw_wall doit
# pouvoir se poser proprement, pas d'arbres ni de bunkers parasites).
mg_name = flat
mgflat_ground_level = 8
mg_flags = light,biomes
mgflat_spflags = nolakes,nohills
mapgen_limit = 2000
active_block_range = 6
max_block_send_distance = 16

# Spawn au pied de la maison cozy (tgw_house ajuste si besoin)
static_spawnpoint = 0,9,0

# Temps : cycle jour/nuit actif (raids de nuit plus durs)
time_speed = 72

# Perf
dedicated_server_step = 0.09
abm_interval = 1.0

# Minimap activée
enable_minimap = true
minimap_shape_round = false

# Logs
debug_log_level = action

# Désactive le smoke test MTG
minetest_game_smoke_test = false

# lumia_music conservé pour ambiance combat
lumia.music_enabled = true
lumia.music_master_gain = 0.5
lumia.music_tick = 2.0
lumia.music_combat_timeout = 8.0

# tgw — tunables runtime (cf. tgw_core.config pour le code)
tgw.wall_length = 150
tgw.wall_height = 6
tgw.waves_total = 200
tgw.respawn_cooldown = 10
tgw.pipeline_return_pct = 50
